<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pylon Capital LLC</title>
<meta name="description" content="hello@pylontrading.com">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root {
    --bg: #fbfaf8;
    --fg: #16181d;
    --rule: #e5e2dc;
    --muted: #6b7280;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101216;
      --fg: #e8e6e1;
      --rule: #262a31;
      --muted: #8b929e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }
  a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid var(--rule);
    font-size: clamp(1.05rem, 3.5vw, 1.35rem);
    letter-spacing: 0.04em;
  }
  a:hover { border-bottom-color: var(--muted); }
  footer {
    position: fixed;
    bottom: 1.5rem;
    left: 0;
    right: 0;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<a href="mailto:hello@pylontrading.com">hello@pylontrading.com</a>
<footer>Pylon Capital LLC &copy; 2026</footer>
</body>
</html>
