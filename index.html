<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pylon</title>
<meta name="description" content="Pylon — hello@pylontrading.com">
<style>
  :root {
    --bg: #fbfaf8;
    --fg: #16181d;
    --muted: #6b7280;
    --rule: #e5e2dc;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101216;
      --fg: #e8e6e1;
      --muted: #8b929e;
      --rule: #262a31;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    text-align: center;
  }
  main { max-width: 34rem; }
  h1 {
    font-size: clamp(1.9rem, 6vw, 2.6rem);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-indent: 0.22em;
  }
  .rule {
    width: 3.5rem;
    height: 1px;
    background: var(--rule);
    margin: 1.6rem auto;
  }
  p.tagline {
    color: var(--muted);
    font-size: 1.02rem;
    letter-spacing: 0.02em;
  }
  a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--rule); }
  a:hover { border-bottom-color: var(--muted); }
  footer {
    position: fixed;
    bottom: 1.4rem;
    left: 0; right: 0;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<main>
  <h1>Pylon</h1>
  <div class="rule"></div>
  <p class="tagline"><a href="mailto:hello@pylontrading.com">hello@pylontrading.com</a></p>
</main>
</body>
</html>
